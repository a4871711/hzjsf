<!DOCTYPE html>
<html>
<head>
<title>教练审核</title>
    <#include "/header.html"/>
</head>
<style type="text/css">

    .logo {
        display: inline-block;
        text-align: center;
        margin-right: 15px;
    }
    .logo .logo_img{
        width: 100px;
        height: 100px;
        display: block;
    }
    .logo .upload_file {
        position: absolute;
        top: 0;
        width: 150px;
        height: 150px;
        opacity: 0;
    }

    .logo_ima {
        display: inline-block;
        text-align: center;
        margin-right: 15px;
    }
    .logo_ima .logo_img_ima{
        width: 100px;
        height: 100px;
        display: block;
    }
    .logo_ima .upload_file {
        position: absolute;
        top: 0;
        width: 150px;
        height: 150px;
        opacity: 0;
    }

    .logoImg {
         display: inline-block;
         text-align: center;
         margin-right: 15px;
     }
    .logoImg .logo_img_zhu{
        width: 100px;
        height: 100px;
        display: block;
    }
    .logoImg .upload_file {
        position: absolute;
        top: 0;
        width: 150px;
        height: 150px;
        opacity: 0;
    }

    .upload {
        margin: 5px 0 15px 0px;
    }
    .uploadImg{
        margin: 5px 0 15px 0px;
    }
    .upload-button {
        position: fixed;
        bottom: 0px;
        right: 20px;
    }
</style>
<body>
<div id="rrapp" v-cloak>
	<div v-show="showList">
		<div class="grid-btn">
            <div class="form-group col-sm-2">
                <input type="text" class="form-control" v-model="q.phone" @keyup.enter="query" placeholder="手机号">
            </div>
            <div class="form-group col-sm-2">
                <input type="text" class="form-control" v-model="q.coachName" @keyup.enter="query" placeholder="教练姓名">
            </div>
            <div class="form-group col-sm-2">
                <select class="form-control" v-model="q.approveStatus">
                    <option value="" selected="selected">全部</option>
                    <option value="0" >待审核</option>
                    <option value="1" >审核成功</option>
                    <option value="2" >审核失败</option>
                </select>
            </div>
            <a class="btn btn-default" @click="query">查询</a>

            <#if shiro.hasPermission("sys:coach:details")>
                <a class="btn btn-primary" @click="details"><i class="fa fa-check"></i>&nbsp;审核</a>
            </#if>
            <a class="btn btn-primary" @click="updateGrade"><i class="fa fa-check"></i>&nbsp;编辑</a>
		</div>
	    <table id="jqGrid"></table>
	    <div id="jqGridPager"></div>
    </div>

    <div v-show="!showList" class="panel panel-default">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal"  action="" method="post"  style="width: 80%;" enctype="multipart/form-data">
            <div class="form-group">
                <div class="col-sm-2 control-label">姓名</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.coachName" placeholder="教练名称" disabled="disabled"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">手机号码</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.phone" placeholder="手机号码" disabled="disabled"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">性别</div>
                <div class="form-group col-sm-10">
                    <select class="form-control" v-model="coach.sex" disabled="disabled">
                        <option value="0" >未知</option>
                        <option value="1" >男</option>
                        <option value="2" >女</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">地址</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.province" placeholder="省" disabled="disabled"/>
                </div>
            </div>


            <div class="form-group">
                <div class="col-sm-2 control-label">身份证号</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.identity" placeholder="省份证号" disabled="disabled"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">从业年限</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.employTime" placeholder="从业年限" disabled="disabled"/>
                </div>
            </div>

            <div id="image" class="form-group">
                <div class="col-sm-2 control-label">身份证正面图</div>
                <div class="logo">
                    <img @click="preview" src="../../statics/img/addPhoto.svg" layer-src="../../statics/img/addPhoto.svg" class="logo_img">
                </div>
            </div>

            <div id="ima" class="form-group">
                <div class="col-sm-2 control-label">身份证反面图</div>
                <div class="logo_ima">
                    <img @click="preview" src="../../statics/img/addPhoto.svg" layer-src="../../statics/img/addPhoto.svg" class="logo_img_ima">
                </div>
            </div>

            <div id="img" class="form-group">
                <div class="col-sm-2 control-label">资历证书</div>
                <div class="logoImg">
                    <img @click="preview" src="../../statics/img/addPhoto.svg" layer-src="../../statics/img/addPhoto.svg" class="logo_img_zhu">
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">最低RMB/节起</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.minClassMoney" placeholder="最低RMB/节起" disabled="disabled"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">教练等级</div>
                <select id="selectT" style="width:300px;height:35px;" v-model="coach.grade">
                    <option v-for="c in coachGradeList" :value="c.price">
                        {{c.price}}
                    </option>
                </select>
            </div>


            <div class="form-group">
                <div class="col-sm-2 control-label">审核状态</div>
                <div class="form-group col-sm-10">
                    <select class="form-control" v-model="coach.approveStatus" disabled="disabled">
                        <option value="0" >待审核</option>
                        <option value="1" >审核成功</option>
                        <option value="2" >审核失败</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">审核失败原因</div>
                <div class="col-sm-10">
                    <textarea rows="5" cols="126" v-model="coach.approveResult" placeholder="审核成功不用填写原因，审核失败要填写失败原因"></textarea>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-6 control-label"></div>
                <input type="button" class="btn btn-success" @click="updateSuccess" value="通过"/>
                &nbsp;&nbsp;<input type="button" class="btn btn-danger" @click="updateFailure" value="不通过"/>
                &nbsp;&nbsp;<input type="button" class="btn btn-warning" @click="reload" value="返回"/>
            </div>
        </form>
    </div>
    <div id="anewFileWindow" style="display: none;margin-left: 10%">
        <br/><br/>
        <div class="form-group">
            <div class="col-sm-2 control-label" style="padding-top: 2%;">教练等级</div>
            <select id="selectTt" style="width:330px;height:35px;" v-model="coach.grade">
                <option v-for="c in coachGradeList" :value="c.price">
                    {{c.price}}
                </option>
            </select>
        </div>
        <div class="form-group">
            <div class="col-sm-2 control-label" style="padding-top: 2%;">从业年限</div>
            <div class="col-sm-10">
                <input type="text" class="form-control" v-model="coach.employTime" placeholder="从业年限"/>
            </div>
        </div>
        <br/><br/>
        <div class="form-group" style="padding-top: 2%">
            <div class="col-sm-4 control-label"></div>
            <input type="button" class="btn btn-primary" @click="coachUpdate" value="确定"/>
        </div>
    </div>
    <!--<div v-show="!showDetail" class="panel panel-default">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal"  action="" method="post" enctype="multipart/form-data">

                <div class="col-sm-2 control-label">教练等级</div>
                <select id="selectTt" style="width:300px;height:35px;" v-model="coach.grade">
                    <option v-for="c in coachGradeList" :value="c.price">
                        {{c.price}}
                    </option>
                </select>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">从业年限</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.employTime" placeholder="从业年限"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-6 control-label"></div>
                <input type="button" class="btn btn-primary" @click="coachUpdate" value="确定"/>
                &nbsp;&nbsp;<input type="button" class="btn btn-warning" @click="reload" value="返回"/>
            </div>
        </form>
    </div>-->
</div>
<script src="${request.contextPath}/statics/plugins/jquery.form.js"></script>
<script src="${request.contextPath}/statics/js/modules/sys/coach.js?_${.now?long}"></script>
</body>
</html>
