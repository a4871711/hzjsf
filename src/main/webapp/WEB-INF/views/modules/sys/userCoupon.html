<!DOCTYPE html>
<html>
<head>
<title>用户优惠券管理</title>
<#include "/header.html"/>
</head>
<body>
<div id="rrapp" v-cloak>
	<div v-show="showList">
		<div class="grid-btn">
			<div class="form-group col-md-2">
				<input type="text" class="form-control" v-model="q.phone" @keyup.enter="query" placeholder="用户手机号">
			</div>
			<div class="form-group col-md-2">
				<input id="sdate" class="Wdate" style="width: 100%;padding: 5px 10px;" onfocus="WdatePicker({dateFmt:'yyyy-MM-dd HH:mm:ss',readOnly:true,maxDate:'#F{$dp.$D(\'edate\')}'})"  placeholder="开始时间"  />
			</div>
			<div class="form-group col-md-2">
				<input id="edate" class="Wdate" style="width: 100%;padding: 5px 10px;" onfocus="WdatePicker({dateFmt:'yyyy-MM-dd HH:mm:ss',readOnly:true,minDate:'#F{$dp.$D(\'sdate\')}',startDate:'#F{$dp.$D(\'sdate\',{d:+1})}'})"  placeholder="结束时间" /><br>
			</div>
			<a class="btn btn-default" @click="query">查询</a>

			<span>
				<#if shiro.hasPermission("sys:user:couponInfo")>
					<a class="btn btn-primary" @click="lookDetail"><i class="fa fa-asterisk"></i>&nbsp;优惠券详情</a>
				</#if>
			</span>

			<#if shiro.hasPermission("sys:user:sendCoupon")>
				<a class="btn btn-primary" @click="sendCoupon"><i class="fa fa-check"></i>&nbsp;发放优惠券</a>
			</#if>
		</div>

	    <table id="jqGrid"></table>
	    <div id="jqGridPager"></div>
    </div>

    <div id="anewFileWindow" style="display: none;margin-left: 10%">
        <div class="form-group">
            <div class="col-sm-10">
                优惠券名称<input type="text" class="form-control" v-model="coupon.couponTitle" name="color" placeholder="优惠券名称"/>
            </div>
        </div>
        
        <div class="form-group">
            <div class="col-sm-10">
                优惠券金额<input type="text" class="form-control" v-model="coupon.couponMoney" name="color" placeholder="优惠券金额"/>
            </div>
        </div>
        
        <div class="form-group">
            <div class="col-sm-10">
                优惠券门槛<input type="text" class="form-control" v-model="coupon.limitPrice" name="color" placeholder="优惠券门槛"/>
            </div>
        </div>

        <div class="form-group" >
            <div class="col-sm-10" style="padding-top: 2%;">
                优惠券有效（天）数<input type="text" class="form-control"v-model="coupon.validDay" name="size" placeholder="优惠券有效（天）数"/>
            </div>
        </div>
        
        <div class="form-group">
            <div class="col-sm-10">
                可用门店<input type="text" class="form-control" v-model="coupon.storeAddrIds" name="color" placeholder="可用门店"/>
            </div>
        </div>

        <div class="form-group" style="padding-top: 2%">
            <div class="col-sm-4 control-label"></div>
            <input type="button" class="btn btn-primary" @click="saveCoupon" value="确认"/>
        </div>
    </div>

	<div v-show="!showDetail" class="panel panel-default" >
		<div class="panel-heading">优惠券详情</div>

		<table border="2" width="960">
			<tr>
				<th>优惠券编号</th>
				<th>优惠券金额(单位：元)</th>
				<th>优惠券使用状态</th>
				<th>过期时间</th>
			</tr>
			<tr v-for="item in couponDetail">
				<td>{{item.couponId}}</td>
				<td>{{item.couponPrice}}</td>
				<td>{{item.couponStatus}}</td>
				<td>{{item.validityTime}}</td>
			</tr>
		</table>

		<div class="form-group">
			<div class="col-sm-2 control-label"></div>
			<input type="button" class="btn btn-warning" @click="reload" value="返回"/>
		</div>

	</div>
</div>

<script src="${request.contextPath}/statics/plugins/jquery.form.js"></script>
<script src="${request.contextPath}/statics/js/modules/sys/userCoupon.js?_${.now?long}"></script>
<script src="${request.contextPath}/statics/plugins/My97DatePicker/WdatePicker.js"></script>
</body>
</html>
