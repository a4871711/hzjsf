<!DOCTYPE html>
<html>
<head>
<title>商品管理</title>
    <#include "/header.html"/>
    <script src="${request.contextPath}/statics/plugins/ueditor-1.4.3.3/ueditor.config.js"></script>
    <script src="${request.contextPath}/statics/plugins/ueditor-1.4.3.3/ueditor.all.js"></script>

</head>
<style type="text/css">

    .logo {
        display: inline-block;
        text-align: center;
        margin-right: 15px;
    }
    .logo .logo_img{
        width: 100px;
        height: 100px;
        display: block;
    }
    .logo .upload_file {
        position: absolute;
        top: 0;
        width: 150px;
        height: 150px;
        opacity: 0;
    }


    .logoImg {
         display: inline-block;
         text-align: center;
         margin-right: 15px;
     }
    .logoImg .logo_img_zhu{
        width: 100px;
        height: 100px;
        display: block;
    }
    .logoImg .upload_file {
        position: absolute;
        top: 0;
        width: 150px;
        height: 150px;
        opacity: 0;
    }



    .upload {
        margin: 5px 0 15px 0px;
    }
    .uploadImg{
        margin: 5px 0 15px 0px;
    }
    .uploadRemark{
        margin: 5px 0 15px 0px;
    }

    .upload-button {
        position: fixed;
        bottom: 0px;
        right: 20px;
    }

</style>
<body>
<div id="rrapp" v-cloak>
	<div v-show="showList">
		<div class="grid-btn">

            <#if shiro.hasPermission("sys:goods:update")>
                <a class="btn btn-primary" @click="update"><i class="fa fa-pencil-square-o"></i>&nbsp;修改</a>
            </#if>
            <#if shiro.hasPermission("sys:goods:delete")>
                <a class="btn btn-primary" @click="del"><i class="fa fa-trash-o"></i>&nbsp;删除</a>
            </#if>
            <a class="btn btn-warning" href="javascript:" onclick="window.history.back(-1)">&nbsp;返回</a>
		</div>
	    <table id="jqGrid"></table>
	    <div id="jqGridPager"></div>
    </div>


    <div v-show="!showList" class="panel panel-default">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal" action="" method="post"  style="width: 80%;" enctype="multipart/form-data">
            <div class="form-group">
                <div class="col-sm-2 control-label">商品颜色(或型号)</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="Goods.color" placeholder="商品颜色"/>
                </div>
            </div>


            <div class="form-group">
                <div class="col-sm-2 control-label">商品尺寸(或规格)</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="Goods.size" placeholder="商品尺寸"/>
                </div>
            </div>


            <div id="img" class="form-group">
                <div class="col-sm-2 control-label">商品主图</div>
                <div class="logoImg">
                    <img @click="preview" src="../../statics/img/addPhoto.svg" layer-src="../../statics/img/addPhoto.svg" class="logo_img_zhu">
                    <a class="btn btn-primary btn-xs uploadImg">上传</a>
                </div>
            </div>

            <br/>
            <div class="form-group">
                <div class="col-sm-6 control-label"></div>
                <input type="button" class="btn btn-primary" @click="saveOrUpdate" value="确定"/>
                &nbsp;&nbsp;<input type="button" class="btn btn-warning" @click="reload" value="返回"/>
            </div>
        </form>
    </div>
</div>

<script src="${request.contextPath}/statics/plugins/jquery.form.js"></script>
<script src="${request.contextPath}/statics/libs/ajaxupload.js"></script>
<script src="${request.contextPath}/statics/js/modules/sys/goodsdetail.js?_${.now?long}"></script>
</body>
</html>
