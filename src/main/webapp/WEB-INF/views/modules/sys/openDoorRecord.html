<!DOCTYPE html>
<html>
<head>
<title>扫码开门记录</title>
<#include "/header.html"/>
</head>
<body>
<div id="rrapp" v-cloak>
	<div>
		<div class="row">
			<div class="grid-btn">
				<div class="form-group col-sm-2">
					<input type="text" class="form-control" v-model="q.phone" @keyup.enter="query" placeholder="用户手机号">
				</div>
				<div class="form-group col-sm-2">
					<input type="text" class="form-control" v-model="q.store_name" @keyup.enter="query" placeholder="门店名称">
				</div>
				<a class="btn btn-default" @click="query"><i class="fa fa-search"></i>&nbsp;查询</a>
				<a class="btn btn-default" onclick="vm.exportAll()"><i class="fa fa-upload"></i>&nbsp;导出所有数据</a>
			</div>
		</div>
		<div class="row" style="padding-bottom: 15px;">预估到店人数总计<span id="total">0</span>人（两小时内在店）</div>
	    <table id="jqGrid"></table>
	    <div id="jqGridPager"></div>
    </div>
</div>

<script src="${request.contextPath}/statics/js/modules/sys/openDoorRecord.js?_${.now?long}"></script>



</body>
</html>
