<!DOCTYPE html>
<html>
<head>
<title>一级分类</title>
    <#include "/header.html"/>
</head>
<style type="text/css">
    .logo {
        display: inline-block;
        text-align: center;
        margin-right: 15px;
    }
    .logo .logo_img{
        width: 100px;
        height: 100px;
        display: block;
    }
    .logo .upload_file {
        position: absolute;
        top: 0;
        width: 150px;
        height: 150px;
        opacity: 0;
    }

    .upload {
        margin: 5px 0 15px 0px;
    }

</style>
<body>
<div id="rrapp" v-cloak>
	<div v-show="showList">
		<div class="grid-btn">
            <div class="form-group col-sm-2">
                <input type="text" class="form-control" v-model="q.categoryName" @keyup.enter="query" placeholder="一级分类名称">
            </div>
            <a class="btn btn-default" @click="query">查询</a>

            <!--<#if shiro.hasPermission("sys:goodsCategory:save")>
                <a class="btn btn-primary" @click="add"><i class="fa fa-plus"></i>&nbsp;新增</a>
            </#if>-->
            <#if shiro.hasPermission("sys:goodsCategory:update")>
                <a class="btn btn-primary" @click="update"><i class="fa fa-pencil-square-o"></i>&nbsp;修改</a>
            </#if>
            <!--<#if shiro.hasPermission("sys:goodsCategory:delete")>
                <a class="btn btn-primary" @click="del"><i class="fa fa-trash-o"></i>&nbsp;删除</a>
            </#if>-->

		</div>
	    <table id="jqGrid"></table>
	    <div id="jqGridPager"></div>
    </div>

    <div v-show="!showList" class="panel panel-default">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal"  action="" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <div class="col-sm-2 control-label">一级分类名称</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="goodsCategory.categoryName" placeholder="一级分类名称"/>
                </div>
            </div>

            <div id="image" class="form-group">
                <div class="col-sm-2 control-label">分类主图</div>
                <div class="logo">
                    <img @click="preview" src="../../statics/img/addPhoto.svg" layer-src="../../statics/img/addPhoto.svg" class="logo_img">
                    <a class="btn btn-primary btn-xs upload">上传</a>
                    <span>*请上传宽80像素，高80像素的图片</span>
                </div>
            </div>

            <br/>
            <div class="form-group">
                <div class="col-sm-6 control-label"></div>
                <input type="button" class="btn btn-primary" @click="saveOrUpdate" value="确定"/>
                &nbsp;&nbsp;<input type="button" class="btn btn-warning" @click="reload" value="返回"/>
            </div>
        </form>
    </div>
</div>

<script src="${request.contextPath}/statics/plugins/jquery.form.js"></script>
<script src="${request.contextPath}/statics/libs/ajaxupload.js"></script>
<script src="${request.contextPath}/statics/js/modules/sys/goodscategory.js?_${.now?long}"></script>

</body>
</html>
