<!DOCTYPE html>
<html>
<head>
<title>私教课管理</title>
	<#include "/header.html"/>
</head>
<body>
<div id="rrapp" v-cloak>
	<div v-show="showList">
		<div class="grid-btn">
            <div class="form-group col-lg-2">
                <input type="text" class="form-control" v-model="q.orderNo" @keyup.enter="query" placeholder="订单编号">
            </div>
            <div class="form-group col-lg-2">
                <input type="text" class="form-control" v-model="q.stuPhone" @keyup.enter="query" placeholder="学员手机号">
            </div>
            <div class="form-group col-lg-2">
                <input type="text" class="form-control" v-model="q.coachPhone" @keyup.enter="query" placeholder="教练手机号">
            </div>
            <div class="form-group col-lg-2">
                <select class="form-control" v-model="q.classStatus" >
                    <option value="-1" style="color: #afafaf">请选择订单状态</option>
                    <option value="0" >进行中</option>
                    <option value="1" >已完成</option>
                    <option value="2" >已取消</option>
                    <option value="3" >已过期</option>
                </select>

            </div>
            <a class="btn btn-default" @click="query"><i class="fa fa-search"></i>&nbsp;查询</a>
            <span v-if="q.classStatus == 0">
                <#if shiro.hasPermission("sys:storeClass:update")>
                      <a class="btn btn-primary" @click="pay"><i class="fa fa-check"></i>&nbsp;确认</a>
                </#if>
            </span>
		</div>

	    <table id="jqGrid"></table>
	    <div id="jqGridPager"></div>
    </div>

</div>
<script src="${request.contextPath}/statics/js/modules/sys/classManage.js?_${.now?long}"></script>
</body>
</html>
