<!DOCTYPE html>
<html>
<head>
    <title>机械表</title>
    <#include "/header.html"/>
        <style>
            .logo {
                display: inline-block;
                text-align: center;
                margin-right: 15px;
            }

            .logo .logo_img {
                width: 200px;
                height: 200px;
                display: block;
                background-image: url("/statics/img/addPhoto.svg");
                background-size: cover;

            }

            .logo .upload_file {
                position: absolute;
                top: 0;
                width: 250px;
                height: 250px;
                opacity: 0;
            }

            .upload {
                margin: 5px 0 15px 0px;
            }

            .upload-button {
                position: fixed;
                bottom: 0px;
                right: 20px;
            }

        </style>
        </head>
<body>
<script src="${request.contextPath}/statics/plugins/ueditor-1.4.3.3/ueditor.config.js"></script>
<script src="${request.contextPath}/statics/plugins/ueditor-1.4.3.3/ueditor.all.js"></script>

<div id="rrapp" v-cloak>
    <div v-show="showList">
        <div class="grid-btn">
            <#if shiro.hasPermission("sys:gymengine:save")>
                <a class="btn btn-primary" @click="add"><i class="fa fa-plus"></i>&nbsp;新增</a>
            </#if>
            <#if shiro.hasPermission("sys:gymengine:update")>
                <a class="btn btn-primary" @click="update"><i class="fa fa-pencil-square-o"></i>&nbsp;修改</a>
            </#if>
            <#if shiro.hasPermission("sys:gymengine:delete")>
                <a class="btn btn-primary" @click="del"><i class="fa fa-trash-o"></i>&nbsp;删除</a>
            </#if>
        </div>
        <table id="jqGrid"></table>
        <div id="jqGridPager"></div>
    </div>

    <div id="anewFileWindow" style="display: none;margin-left: 10%">
        <div class="form-group">
            <div class="col-sm-10">
                <input type="text" class="form-control" v-model="gymType.gtName" name="gtName" placeholder="一级分类名称"/>
            </div>
        </div>

        <div class="form-group">
            <div class="col-sm-4 control-label"></div>
            <input type="button" class="btn btn-primary" @click="saveOrUpdateGymType" value="确认"/>
        </div>
    </div>

    <div v-show="!showList" class="panel panel-default">
        <div class="panel-heading">{{title}}</div>
        <div class="row">
            <div class="col-sm-5 form-horizontal">
                <div class="form-group">
                    <div class="col-sm-4 control-label">一级分类</div>
                    <div class="col-sm-5">
                        <select class="form-control" v-model="gymEngine.gtId" >
                            <option v-for="item in gymTypeList" :value="item.gtId">
                                {{ item.gtName }}</option>
                        </select>
                    </div>
                    <div class="btn btn-primary" @click="gtDefinedType"><span class="fa fa-plus">&nbsp;自定义分类</span></div>
                </div>
                <div class="form-group">
                    <div class="col-sm-4 control-label">器械名称</div>
                    <div class="col-sm-8">
                        <input type="text" class="form-control" v-model="gymEngine.engineName" placeholder="器械名称"/>
                    </div>
                </div>
                <div id="images" class="form-group">
                    <div class="col-sm-4 control-label">视频封面</div>
                    <div class="col-sm-6 logo">
                        <img @click="preview" src="../../statics/img/addPhoto.svg"
                             layer-src="../../statics/img/addPhoto.svg" class="logo_img" width="100px" height="100px">
                        <a class="btn btn-primary btn-xs uploadImg">上传</a>

                    </div>
                    <div>   <span>*请上传宽750像素，高376像素的图片</span></div>
                </div>
                <div class="form-group">
                    <div class="col-sm-4 control-label">器械视频</div>
                    <div class="col-sm-6 logo">
                        <video src="../../statics/img/addPhoto.svg"
                               layer-src="../../statics/img/addPhoto.svg" class="logo_img" width="150px" height="150px"
                               style="width=100%; height=100%; object-fit: fill" controls="controls">
                        </video>
                        <a class="btn btn-primary btn-xs upload">上传</a>
                    </div>
                </div>
            </div>
            <div class="col-sm-7">
                <div class="form-group">
                    <div class="control-label">器械指南</div>
                    <div style="width: 80%">
                        <tr>
                            <td>
                                <script type="text/javascript">
                                    //初始化ueditor工具
                                    var ue = UE.getEditor('editor');
                                </script>
                                <textarea id="editor" v-model="gymEngine.introduce" name="introduce" type="text/plain"
                                          style="width:110%;height:350px;"></textarea>
                            </td>
                        </tr>
                        <span>*器械指南内容图片建议请上传宽660像素，高346像素的</span>
                    </div>
                </div>

            </div>
        </div>
        <div v-show="!showList" class="form-group">
            <div class="col-sm-2 control-label"></div>
            <input type="button" class="btn btn-primary" @click="saveOrUpdate" value="确定"/>&nbsp;&nbsp;
            <input type="button" class="btn btn-warning" @click="reload" value="返回"/>
        </div>
    </div>
    <div id="gtDefined"  style="width: 700px;">
        <br/>
        <div class="form-group col-lg-4">
            <input type="text" class="form-control" v-model="qq.gtName" @keyup.enter="queryGymType" placeholder="分类名称">
        </div>
        <a class="btn btn-primary" @click="queryGymType"><i class="fa fa-search-plus"></i>&nbsp;查询</a>
        <a class="btn btn-primary" @click="addGymType"><i class="fa fa-plus-square"></i>&nbsp;新增</a>
        <table id="jqGridAdd" style="width: 700px"></table>
        <div id="jqGridPagerAdd"></div>
    </div>
    <script src="${request.contextPath}/statics/libs/ajaxupload.js"></script>
    <script src="${request.contextPath}/statics/js/modules/sys/gymengine.js?_${.now?long}"></script>
</div>
</body>
</html>
