<!DOCTYPE html>
<html>
<head>
    <title>钱包明细表</title>
    <#include "/header.html"/>
</head>
<body>
<div id="rrapp" v-cloak>
    <div v-show="showList">
        <div class="grid-btn">
            <!--<#if shiro.hasPermission("sys:walletdetail:delete")>
                <a class="btn btn-primary" @click="del"><i class="fa fa-trash-o"></i>&nbsp;删除</a>
            </#if>-->
            <!--<#if shiro.hasPermission("sys:walletdetail:save")>-->
            <!--<a class="btn btn-primary" @click="add"><i class="fa fa-plus"></i>&nbsp;配置提现周期</a>-->
            <!--</#if>-->
            <div class="form-group col-sm-1" style="width: 15%">
                <input type="text" class="form-control" v-model="q.phone" @keyup.enter="query" placeholder="手机号">
            </div>
            <div class="form-group col-sm-1" style="width: 15%">
                <input type="text" class="form-control" v-model="q.aliAccount" @keyup.enter="query" placeholder="账号">
            </div>

            <div class="form-group col-sm-2" style="width: 12%">
                <select class="form-control" v-model="q.status">
                    <option value="" selected="selected">全部</option>
                    <option value="1">审核中</option>
                    <option value="2">审核失败</option>
                    <option value="3">已完成</option>
                </select>
            </div>

            <div class="form-group col-sm-2"  style="width: 15%">
                <input id="sdate" class="Wdate" style="width: 100%;padding: 5px 10px;"
                       onfocus="WdatePicker({dateFmt:'yyyy-MM-dd HH:mm:ss',readOnly:true,maxDate:'#F{$dp.$D(\'edate\')}'})"
                       placeholder="开始时间"/>
            </div>
            <div class="form-group col-sm-2"  style="width: 15%">
                <input id="edate" class="Wdate" style="width: 100%;padding: 5px 10px;"
                       onfocus="WdatePicker({dateFmt:'yyyy-MM-dd HH:mm:ss',readOnly:true,minDate:'#F{$dp.$D(\'sdate\')}'})"
                       placeholder="结束时间"/><br>
            </div>

            <div>
                <a class="btn btn-default" @click="query">查询</a>
                <#if shiro.hasPermission("sys:walletdetail:update")>
                    <a class="btn btn-primary" @click="update"><i class="fa fa-times"></i>&nbsp;审核失败</a>
                </#if>
                <#if shiro.hasPermission("sys:walletdetail:pay")>
                    <a class="btn btn-primary" @click="pay"><i class="fa fa-check"></i>&nbsp;通过审核</a>
                </#if>
            </div>
        </div>
        <table id="jqGrid"></table>
        <div id="jqGridPager"></div>
    </div>

    <div v-show="!showList" class="panel panel-default">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal">
            <!--<div class="form-group">
<div class="col-sm-2 control-label">用户ID</div>
<div class="col-sm-10">
<input type="text" class="form-control" v-model="walletDetail.userId" placeholder="用户ID"/>
</div>
</div>-->
            <!--<div class="form-group">
<div class="col-sm-2 control-label">金额数</div>
<div class="col-sm-10">
<input type="text" class="form-control" v-model="walletDetail.money" placeholder="金额数"/>
</div>
</div>-->
            <!--<div class="form-group">
<div class="col-sm-2 control-label">流水号</div>
<div class="col-sm-10">
<input type="text" class="form-control" v-model="walletDetail.transactionNumber" placeholder="流水号"/>
</div>
</div>-->
            <div class="form-group">
                <div class="col-sm-2 control-label">失败原因</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.reason" placeholder="失败原因"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">状态</div>
                <div class="col-sm-10">
                    <select type="text" class="form-control" readonly="true" placeholder="状态">
                        <!--<option value="2" readonly="true" >审核失败</option>-->
                        <!--<input type="text" class="form-control" v-model="walletDetail.status" placeholder="状态（1为审核中 2 审核失败 3 已完成）"/>-->
                        <!--<option value="1" >审核中</option>-->
                        <option value="2" selected="selected" readonly="true">审核失败</option>
                    </select>

                    <!--  <input type="text" class="form-control" v-model="walletDetail.status" value="审核失败" placeholder="失败原因"/>-->
                </div>
            </div>
            <!--<div class="form-group">
<div class="col-sm-2 control-label">创建时间</div>
<div class="col-sm-10">
<input type="text" class="form-control" v-model="walletDetail.createTime" placeholder="创建时间"/>
</div>
</div>-->
            <div class="form-group">
                <div class="col-sm-2 control-label"></div>
                <input type="button" class="btn btn-primary" @click="saveOrUpdate" value="确定"/>
                &nbsp;&nbsp;<input type="button" class="btn btn-warning" @click="reload" value="返回"/>
            </div>
        </form>
    </div>
</div>

<script src="${request.contextPath}/statics/plugins/My97DatePicker/WdatePicker.js"></script>
<script src="${request.contextPath}/statics/js/modules/sys/walletdetail.js?_${.now?long}"></script>
</body>
</html>
