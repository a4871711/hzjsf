<!DOCTYPE html>
<html lang="en">
<head>
    <title>three.js webgl - loaders - OBJ loader</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

    <style>
        body {
            font-family: Monospace;
            background-color: #222222;
            background-size: cover;
            color: #fff;
            margin: 0px;
            overflow: hidden;
        }

        #info {
            color: #fff;
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            z-index: 100;
            display: block;
        }

        #info a, .button {
            color: #f00;
            font-weight: bold;
            text-decoration: underline;
            cursor: pointer
        }

        #model {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

    </style>
</head>

<body>
<div id="model"></div>

<script src="js/three.min.js"></script>

<script type="text/javascript" src="../dlc.js" ></script>
<script src="js/Controls.js"></script>

<script>
//    模型文件路径
    var modelPath = '/statics/model/BodyStatusModel/'+getUrlParam('id')+'.obj';
//模型关键点文件路径
    var filePath = "model/3dkeypoints.txt";
//    加载模型
    loadOBJ(modelPath);
</script>

</html>
