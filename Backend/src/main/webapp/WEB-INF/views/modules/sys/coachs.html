<!DOCTYPE html>
<html>
<head>
    <title>教练审核</title>
    <#include "/header.html"/>
</head>
<style type="text/css">

    .logo {
        display: inline-block;
        text-align: center;
        margin-right: 15px;
    }
    .logo .logo_img{
        width: 100px;
        height: 100px;
        display: block;
    }
    .logo .upload_file {
        position: absolute;
        top: 0;
        width: 150px;
        height: 150px;
        opacity: 0;
    }


    .logoImg {
        display: inline-block;
        text-align: center;
        margin-right: 15px;
    }
    .logoImg .logo_img_zhu{
        width: 100px;
        height: 100px;
        display: block;
    }
    .logoImg .upload_file {
        position: absolute;
        top: 0;
        width: 150px;
        height: 150px;
        opacity: 0;
    }

    .upload {
        margin: 5px 0 15px 0px;
    }
    .uploadImg{
        margin: 5px 0 15px 0px;
    }
    .upload-button {
        position: fixed;
        bottom: 0px;
        right: 20px;
    }
</style>
<body>
<div id="rrapp" v-cloak>
    <div v-show="showList">
        <div class="grid-btn">
            <div class="form-group col-sm-2">
                <input type="text" class="form-control" v-model="q.coachName" @keyup.enter="query" placeholder="教练姓名">
            </div>
            <a class="btn btn-default" @click="query">查询</a>

            <#if shiro.hasPermission("sys:coach:details")>
                <a class="btn btn-primary" @click="details"><i class="fa fa-pencil-square-o"></i>&nbsp;详情</a>
            </#if>
            <!--<#if shiro.hasPermission("sys:goods:delete")>
                <a class="btn btn-primary" @click="del"><i class="fa fa-trash-o"></i>&nbsp;删除</a>
            </#if>-->

        </div>
        <table id="jqGrid"></table>
        <div id="jqGridPager"></div>
    </div>

    <div v-show="!showList" class="panel panel-default">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal"  action="" method="post"  style="width: 80%;" enctype="multipart/form-data">

            <!--<div class="form-group">
                <div class="col-sm-2 control-label">姓名</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.coachName" placeholder="教练名称"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">手机号码</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.phone" placeholder="手机号码"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">性别</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.sex" placeholder="性别"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">省</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.province" placeholder="省"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">市</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.city" placeholder="市"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">区、县</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.zone" placeholder="区、县"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">身份证号</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.identity" placeholder="省份证号"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">从业年限</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.employ_time" placeholder="从业年限"/>
                </div>
            </div>

            <div id="image" class="form-group">
                <div class="col-sm-2 control-label">身份证正反面</div>
                <div class="logo">
                    <img @click="preview" src="../../statics/img/addPhoto.svg" layer-src="../../statics/img/addPhoto.svg" class="logo_img">
                    &lt;!&ndash;<a class="btn btn-primary btn-xs upload">上传</a>&ndash;&gt;
                </div>
                <div class="logo">
                    <img @click="preview" src="../../statics/img/addPhoto.svg" layer-src="../../statics/img/addPhoto.svg" class="logo_img">
                    &lt;!&ndash;<a class="btn btn-primary btn-xs upload">上传</a>&ndash;&gt;
                </div>
                <div class="logo">
                    <img @click="preview" src="../../statics/img/addPhoto.svg" layer-src="../../statics/img/addPhoto.svg" class="logo_img">
                    &lt;!&ndash;<a class="btn btn-primary btn-xs upload">上传</a>&ndash;&gt;
                </div>
            </div>

            <div id="img" class="form-group">
                <div class="col-sm-2 control-label">资历证书</div>
                <div class="logoImg">
                    <img @click="preview" src="../../statics/img/addPhoto.svg" layer-src="../../statics/img/addPhoto.svg" class="logo_img_zhu">
                    &lt;!&ndash;<a class="btn btn-primary btn-xs uploadImg">上传</a>&ndash;&gt;
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">审核状态</div>
                <div class="form-group col-sm-10">
                    <select class="form-control" v-model="coach.approveStatus">
                        <option value="0" >待审核</option>
                        <option value="1" >审核成功</option>
                        <option value="2" >审核失败</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">审核失败原因</div>
                <div class="col-sm-10">
                    <textarea rows="5" cols="126" v-model="coach.approveResult" placeholder="审核成功不用填写原因，审核失败要填写失败原因"></textarea>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">审核时间</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.approveTime" placeholder="审核时间"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">最低RMB/节起</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.minClassMoney" placeholder="最低RMB/节起"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">累计上课/节数</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.classCount" placeholder="累计上课/节数"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">教练简介</div>
                <div class="col-sm-10">
                    <textarea rows="5" cols="126" class="form-control" v-model="coach.introduce" placeholder="教练简介"/>
                </div>
            </div>

            <div class="form-group">
                <div class="col-sm-2 control-label">创建时间</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="coach.createdDate" placeholder="创建时间"/>
                </div>
            </div>-->

            <div class="form-group">
                <div class="col-sm-6 control-label"></div>
                <input type="button" class="btn btn-primary" @click="updateSuccess" value="通过"/>
                &nbsp;&nbsp;<input type="button" class="btn btn-primary" @click="updateFailure" value="不通过"/>
                &nbsp;&nbsp;<input type="button" class="btn btn-warning" @click="reload" value="返回"/>
            </div>
        </form>
    </div>
</div>
<script src="${request.contextPath}/statics/plugins/jquery.form.js"></script>
<script src="${request.contextPath}/statics/js/modules/sys/coach.js?_${.now?long}"></script>
</body>
</html>
