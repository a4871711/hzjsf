<!DOCTYPE html>
<html>
<head>
    <title>转卡记录</title>
    <#include "/header.html"/>
        </head>
<body>
<div id="rrapp" v-cloak>
    <div v-show="showList">
        <div class="grid-btn">
            <div class="row">
                <div class="form-group col-sm-1" style="width: 15%">
                    <input type="text" class="form-control" v-model="q.userName" placeholder="转卡用户">
                </div>
                <div class="form-group col-sm-1" style="width: 15%">
                    <input type="text" class="form-control" v-model="q.phone" placeholder="转卡人手机号">
                </div>
                <div class="form-group col-sm-2" style="width: 15%">
                    <input type="text" class="form-control" v-model="q.orderNo" placeholder="订单号">
                </div>
                <div class="form-group col-sm-2" style="width: 15%">
                    <input type="text" class="form-control" v-model="q.storeName" placeholder="门店名称">
                </div>
            </div>
            <div class="">
                <div class="form-group col-md-2">
                    <input id="sdate" class="Wdate" style="width: 100%;padding: 5px 10px;"
                           onfocus="WdatePicker({dateFmt:'yyyy-MM-dd HH:mm:ss',readOnly:true,maxDate:'#F{$dp.$D(\'edate\')}'})"
                           placeholder="开始时间"/>
                </div>
                <div class="form-group col-md-2">
                    <input id="edate" class="Wdate" style="width: 100%;padding: 5px 10px;"
                           onfocus="WdatePicker({dateFmt:'yyyy-MM-dd HH:mm:ss',readOnly:true,minDate:'#F{$dp.$D(\'sdate\')}'})"
                           placeholder="结束时间"/><br>
                </div>
            </div>
            <a class="btn btn-default" @click="query"><i class="fa fa-search"></i>&nbsp;查询</a>

        </div>

        <table id="jqGrid"></table>
        <div id="jqGridPager"></div>
    </div>


</div>

<script src="${request.contextPath}/statics/plugins/jquery.form.js"></script>
<script src="${request.contextPath}/statics/js/modules/sys/transformeddetail.js?_${.now?long}"></script>

<script src="${request.contextPath}/statics/plugins/My97DatePicker/WdatePicker.js"></script>
</body>
</html>
