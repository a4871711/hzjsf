<!DOCTYPE html>
<html>
<head>
    <title>门店水吧台</title>
    <#include "/header.html"/>
        </head>
<body>
<div id="rrapp" v-cloak>
    <div v-show="showList">
        <div class="grid-btn">
            <div class="row">
                <div class="form-group col-sm-2">
                    <input type="text" class="form-control" v-model="q.userName" placeholder="用户">
                </div>
                <div class="form-group col-sm-2">
                    <input type="text" class="form-control" v-model="q.orderNo" placeholder="订单号">
                </div>
                <div class="form-group col-sm-2">
                    <input type="text" class="form-control" v-model="q.storeName" placeholder="门店名称">
                </div>

            </div>

            <div class="form-group col-md-2">
                <input id="sdate" class="Wdate" style="width: 100%;padding: 5px 10px;"
                       onfocus="WdatePicker({dateFmt:'yyyy-MM-dd HH:mm:ss',readOnly:true,maxDate:'#F{$dp.$D(\'edate\')}'})"
                       placeholder="起始时间"/>
            </div>
            <div class="form-group col-md-2">
                <input id="edate" class="Wdate" style="width: 100%;padding: 5px 10px;"
                       onfocus="WdatePicker({dateFmt:'yyyy-MM-dd HH:mm:ss',readOnly:true,minDate:'#F{$dp.$D(\'sdate\')}'})"
                       placeholder="结束时间"/><br>
            </div>
            <a class="btn btn-default" @click="query">查询</a>

            <a class="btn btn-default" onclick="location.reload()">重置</a>
            <a class="btn btn-primary" @click="lookOrderDetail"><i class="fa fa-check"></i>&nbsp;交易详情</a>
         <!--   <a class="btn btn-default" onclick="vm.export()">部分导出</a>
            <a class="btn btn-default" onclick="vm.exportAll()">导出所有数据</a>
-->
        </div>
        <div class="row"><h3 style="display: inline">所有门店水吧台总收入: <span id="countMoney"></span></h3>

            <h4 style="display: inline;margin-left: 20px">本页收入: <span id="pageMoney"></span></h4></div>
        <table id="jqGrid"></table>
        <div id="jqGridPager"></div>

    </div>

    <div v-show="!showDetail" class="panel panel-default" >
        <div class="panel-heading">交易详情</div>

        <table border="2" width="960">
            <tr>
                <th>订单编号</th>
                <th>条码</th>
                <th>商品名称</th>
                <th>单价</th>
                <th>规格</th>
                <th>购买数量</th>
            </tr>
            <tr v-for="item in orderDetail">
                <td>{{item.orderNo}}</td>
                <td>{{item.barCode}}</td>
                <td>{{item.name}}</td>
                <td>{{item.price}}</td>
                <td>{{item.style}}</td>
                <td>{{item.num}}</td>
            </tr>
        </table>
        <br/>
        <div class="form-group">
            <div class="col-sm-2 control-label"></div>
            <input type="button" class="btn btn-warning" @click="reload" value="返回"/>
        </div>
    </div>
    </div>

    <script src="${request.contextPath}/statics/plugins/My97DatePicker/WdatePicker.js"></script>
    <script src="${request.contextPath}/statics/plugins/jquery.form.js"></script>
    <script src="${request.contextPath}/statics/js/modules/sys/allstoreincomepaydetail.js?_${.now?long}"></script>

</body>
</html>
