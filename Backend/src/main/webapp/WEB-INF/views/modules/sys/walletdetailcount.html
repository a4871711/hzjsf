<!DOCTYPE html>
<html>
<head>
    <title>钱包明细表</title>
    <#include "/header.html"/>
        </head>
<body>
<div id="rrapp" v-cloak>
    <div v-show="showList">
        <div class="grid-btn" style="height:20%;">
            <div class="row">
            <div class="form-group col-sm-2" style="width:15%;">
                <input type="text" class="form-control" v-model="q.userName" placeholder="用户">
            </div>
                <div class="form-group col-sm-2" style="width:15%;">
                    <input type="text" class="form-control" v-model="q.phone" placeholder="手机号">
                </div>
            <div class="form-group col-sm-2" style="width:15%;">
                <input type="text" class="form-control" v-model="q.orderNo" placeholder="订单号">
            </div>

            <div class="form-group col-sm-2">
                <select class="form-control" v-model="q.status">
                    <option value="">审核状态</option>
                    <option value="1">审核中</option>
                    <option value="2">审核失败</option>
                    <option value="3">已完成</option><!--
                    <option value="4">提现中</option>
                    <option value="5">提现失败</option>-->
                </select>
            </div>

            <div class="form-group col-sm-2">
                <select class="form-control" v-model="q.type">
                    <option value="">提现类型</option>
                    <option value="1">用户提现</option>
                    <option value="2">教练提现</option>
                </select>
            </div>
            </div><div>
            <div class="form-group col-md-2">
                <input id="sdate" class="Wdate" style="width: 100%;padding: 5px 10px;"
                       onfocus="WdatePicker({dateFmt:'yyyy-MM-dd HH:mm:ss',readOnly:true,maxDate:'#F{$dp.$D(\'edate\')}'})"
                       placeholder="开始时间"/>
            </div>
            <div class="form-group col-md-2">
                <input id="edate" class="Wdate" style="width: 100%;padding: 5px 10px;"
                       onfocus="WdatePicker({dateFmt:'yyyy-MM-dd HH:mm:ss',readOnly:true,minDate:'#F{$dp.$D(\'sdate\')}'})"
                       placeholder="结束时间"/><br>
            </div>
        </div>
        <a class="btn btn-default" @click="query"><i class="fa fa-search"></i>&nbsp;查询</a>

        <a class="btn btn-default" onclick="location.reload()">重置</a>
        </div>
        <table id="jqGrid"></table>
        <div id="jqGridPager"></div>
    </div>

    <div v-show="!showList" class="panel panel-default">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal">
            <div class="form-group">
                <div class="col-sm-2 control-label">用户ID</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.userId" placeholder="用户ID"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">明细类型（1.(用户) 提现 2.（教练）提现 3.(用户）充值）</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.type"
                           placeholder="明细类型（1.(用户) 提现 2.（教练）提现 3.(用户）充值）"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">金额数</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.money" placeholder="金额数"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">提现到的支付宝号</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.AliAccount" placeholder="提现到的支付宝号"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">提现到的微信号</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.wxCount" placeholder="提现到的微信号"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">流水号</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.transactionNumber" placeholder="流水号"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">失败原因</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.reason" placeholder="失败原因"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">提现,充值订单号</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.orderNo" placeholder="提现,充值订单号"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">状态（1为审核中 2审核失败 3已完成 4提现中 5提现失败,6 充值失败 0：充值中）</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.status"
                           placeholder="状态（1为审核中 2审核失败 3已完成  4提现中 5提现失败,6 充值失败 0：充值中）"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">微信openId</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.openId" placeholder="微信openId"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">审核通过时间</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.checkedTime" placeholder="审核通过时间"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">交易完成时间</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.transactionTime"
                           placeholder="交易完成时间"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label">创建时间</div>
                <div class="col-sm-10">
                    <input type="text" class="form-control" v-model="walletDetail.createTime" placeholder="创建时间"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label"></div>
                <input type="button" class="btn btn-primary" @click="saveOrUpdate" value="确定"/>
                &nbsp;&nbsp;<input type="button" class="btn btn-warning" @click="reload" value="返回"/>
            </div>
        </form>
    </div>
</div>

<script src="${request.contextPath}/statics/js/modules/sys/walletdetailcount.js?_${.now?long}"></script>

<script src="${request.contextPath}/statics/plugins/My97DatePicker/WdatePicker.js"></script>
</body>
</html>
