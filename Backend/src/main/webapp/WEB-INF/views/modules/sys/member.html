<!DOCTYPE html>
<html>
<head>
    <title>会员规则</title>
    <#include "/header.html"/>
</head>
<body>
<div id="rrapp" v-cloak>
    <div v-show="showList">
        <div class="grid-btn">
            <!--<#if shiro.hasPermission("sys:datamap:save")>-->
            <!--<a class="btn btn-primary" @click="add"><i class="fa fa-plus"></i>&nbsp;新增</a>-->
            <!--</#if>-->
            <#if shiro.hasPermission("sys:datamap:update")>
                <a class="btn btn-primary" @click="update"><i class="fa fa-pencil-square-o"></i>&nbsp;修改</a>
            </#if>
            <!--<#if shiro.hasPermission("sys:datamap:delete")>-->
            <!--<a class="btn btn-primary" @click="del"><i class="fa fa-trash-o"></i>&nbsp;删除</a>-->
            <!--</#if>-->
        </div>
        <table id="deptTable" data-mobile-responsive="true" data-click-to-select="true">
            <thead>
            <tr>
                <th data-field="selectItem" data-checkbox="true"></th>
            </tr>
            </thead>
        </table>
        <table id="jqGrid"></table>
        <div id="jqGridPager"></div>
    </div>
    <script src="${request.contextPath}/statics/plugins/ueditor-1.4.3.3/ueditor.config.js"></script>
    <script src="${request.contextPath}/statics/plugins/ueditor-1.4.3.3/ueditor.all.js"></script>
    <div v-show="!showList" class="panel panel-default">
        <div class="panel-heading">{{title}}</div>
        <form class="form-horizontal" style="width: 95%">
            <div class="form-group">
                <div class="col-sm-1 control-label">名称</div>
                <div class="col-sm-11">
                    <input class="form-control" v-model="dataMapEntityList.dataName" placeholder="名称" style="width: 200px; height: 50px"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-1 control-label">每日积分上限（卡类用户）</div>
                <div class="col-sm-11">
                    <input class="form-control" v-model="dataMapEntityList.price" placeholder="每日积分上限(卡类用户)" style="width: 200px;height: 50px"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-1 control-label">每日积分上限（非卡类用户）</div>
                <div class="col-sm-11">
                    <input class="form-control" v-model="dataMapEntityList.val" placeholder="每日积分上限(非卡类用户)" style="width: 200px;height: 50px"/>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-1 control-label">说明</div>
                <div class="col-sm-11">
                    <script type="text/javascript">
                        //初始化ueditor工具
                        var ue = UE.getEditor('editor');
                    </script>
                    <textarea id="editor" v-model="dataMapEntityList.description" name="description" type="text/plain"
                              style="width:90%;height:350px;"></textarea>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-2 control-label"></div>
                <input type="button" class="btn btn-primary" @click="saveOrUpdate" value="确定"/>
                &nbsp;&nbsp;<input type="button" class="btn btn-warning" @click="reload" value="返回"/>
            </div>
        </form>
    </div>
</div>

<!-- 选择部门 -->
<div id="deptLayer" style="display: none;padding:10px;">
    <ul id="deptTree" class="ztree"></ul>
</div>

<script src="${request.contextPath}/statics/js/modules/sys/member.js?_${.now?long}"></script>
</body>
</html>
