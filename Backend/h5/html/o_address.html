<script type="text/javascript" src="../js/jquery-1.11.1.min.js"></script>

<script type="text/javascript" src="../js/o_base.js"></script>
<script>
    var addressData;
    ajaxPost({}, "api/address/list", function (res) {
        var str = "";
        if (res.code == 101) {
            moveItem("userInfo")
            getToken();
        }
        if (res.code == 1) {
            if (res.data.length == 0) {
                $('.empty').show()
            } else {
                addressData = res.data;
                res.data.forEach((item, index) => {
                    var addressName = item.province + item.city + item.zone + " " + item.addr;
                    str +=
                        '<div class="mg-t-10 pd-15 bfff aui-content">' +
                        '<label class="aui-list-item-label aui-list aui-list-in mg-t-10">' +
                        '<div class="border-b pd-b-15" onclick="pickUp(' + item.userAddressId + ',\'' +
                        addressName + '\')">' +
                        '<div class="address font15">' + addressName + '</div>' +
                        '<div class="flex cbbb">' +
                        '<div class="name">' + item.userName + '</div>' +
                        '<div class="phone mg-l-10">' + item.phone + '</div>' +
                        '</div>' +
                        '</div>' +
                        '<div class="tool pd-t-15 flex flexBetween flexACenter">' +
                        // '<input class="aui-radio" type="radio" name="address" checked>' +
                        '</div>' +
                        '<div class="tools flex flexBetween flexACenter wd-40">' +
                        '<div class="edit wd-50 flex" onclick="editAddress(' + item.userAddressId +
                        ',' + index + ')">' +
                        '<div class="aui-list-item-label-icon">' +
                        '<i class="aui-iconfont aui-icon-edit mg-r-5"></i>' +
                        '</div>' +
                        '<div class="aui-list-item-inner">编辑</div>' +
                        '</div>' +
                        '<div class="delete wd-50 flex" onclick="delAddress(' + item.userAddressId +
                        ')">' +
                        '<div class="aui-list-item-label-icon">' +
                        '<i class="aui-iconfont aui-icon-trash mg-r-5"></i>' +
                        '</div>' +
                        '<div class="aui-list-item-inner">删除</div>' +
                        '</div>' +
                        '</div>' +
                        '</label>' +

                        '</div>';
                });
                $(".addressList").html(str)
            }
        }
    });

    function editAddress(id, index) {
        setItem("editAddress", JSON.stringify(addressData[index]))
        goTo("o_addressAdd.html", "addressId=" + id);
    }

    function delAddress(id) {
        ajaxPost({
            userAddressId: id
        }, "api/address/delete", function (res) {
            layer_msg(res.msg)
            setTimeout(() => {
                location.reload();
            }, 1500);
        });
    }

    function pickUp(id, address) {
        setItem("address", address)
        goTo("o_order.html", "addressId=" + id);
    }

    $(".mainBtn").on("click", function (res) {
        goTo("o_addressAdd.html")
    });
</script>
